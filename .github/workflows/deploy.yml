name: Deploy to GitHub Pages

on:
  # Deploy whenever main is updated
  push:
    branches: [main]
  # ...and allow deploying by hand from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let one deploy finish rather than cancelling it mid-flight
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      # The site is plain HTML/CSS with no build step, so upload the repo as-is.
      # This action already excludes .git and .github from the artifact.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - id: deployment
        uses: actions/deploy-pages@v4
